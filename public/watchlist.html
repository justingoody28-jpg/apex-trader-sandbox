<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Watchlist Manager</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: #1e2330;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --pill-sm: #1e3a2f;
    --pill-sm-t: #34d399;
    --pill-mid: #1e2d4a;
    --pill-mid-t: #60a5fa;
    --pill-lg: #2d1e4a;
    --pill-lg-t: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; font-size: 13px; min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; transition: all .15s; }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .title { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
  .title span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .count-badge { background: var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted); }
  .count-badge b { color: var(--text); }
  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .save-btn:hover { opacity: .85; }
  .save-indicator { font-size: 11px; color: var(--green); opacity: 0; transition: opacity .3s; }
  .save-indicator.show { opacity: 1; }

  /* Controls */
  .controls { padding: 14px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-inp { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px 6px 30px; color: var(--text); font-size: 12px; outline: none; transition: border-color .15s; }
  .search-inp:focus { border-color: var(--accent); }
  .search-inp::placeholder { color: var(--muted); }
  select.filter { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
  select.filter:focus { border-color: var(--accent); }
  .ctrl-sep { width: 1px; height: 24px; background: var(--border); }
  .bulk-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; transition: all .15s; }
  .bulk-btn:hover { color: var(--text); border-color: var(--muted); }
  .ctrl-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .sort-label { color: var(--muted); font-size: 11px; }

  /* Table */
  .table-wrap { padding: 0 24px 40px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  thead th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { display: inline-block; margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  th.col-active, td.col-active { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: rgba(59,130,246,.04); }
  tbody tr.inactive { opacity: .45; }
  td { padding: 8px 12px; }
  td.col-sym { font-weight: 700; font-size: 13px; letter-spacing: .3px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); }
  .cap-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; white-space: nowrap; }
  .cap-pill.large { background: var(--pill-lg); color: var(--pill-lg-t); }
  .cap-pill.mid { background: var(--pill-mid); color: var(--pill-mid-t); }
  .cap-pill.small { background: var(--pill-sm); color: var(--pill-sm-t); }
  td.col-seg { color: var(--muted); font-size: 12px; }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 20px; transition: background .2s; }
  .slider:before { content: ''; position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s; }
  input:checked + .slider { background: var(--green); }
  input:checked + .slider:before { transform: translateX(16px); }

  /* Group headers */
  .group-row td { background: rgba(255,255,255,.025); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); padding: 6px 12px; }

  /* Empty state */
  .empty-row td { text-align: center; padding: 40px; color: var(--muted); }

  /* Responsive */
  @media (max-width: 640px) {
    .controls { padding: 10px 16px; }
    .table-wrap { padding: 0 16px 40px; }
    .header { padding: 12px 16px; }
    .col-seg { display: none; }
  }
</style>
</head>

<div class="header">

    <a href="/edge-scenarios.html" class="back-btn">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>

    </a>
    <div class="title"><span>APEX</span> Watchlist Manager</div>
  </div>
  <div class="header-right">

    <span class="save-indicator" id="saveIndicator">â Saved</span>

</div>

<div class="controls">

  <select class="filter" id="capFilter" onchange="renderTable()">

    <option value="Large">Large Cap</option>
    <option value="Mid">Mid Cap</option>
    <option value="Small/Micro">Small/Micro Cap</option>
  </select>
  <select class="filter" id="segFilter" onchange="renderTable()">
    <option value="">All Segments</option>
  </select>
  <select class="filter" id="activeFilter" onchange="renderTable()">
    <option value="">All Status</option>
    <option value="active">Active Only</option>
    <option value="inactive">Inactive Only</option>
  </select>
  <div class="ctrl-sep"></div>
  <button class="bulk-btn" onclick="bulkToggle(true)">Enable All</button>
  <button class="bulk-btn" onclick="bulkToggle(false)">Disable All</button>
  <button class="bulk-btn" onclick="resetToDefault()">Reset Default</button>
</div>

<div class="table-wrap">

        <th class="col-active">Active</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

  {t:'PZZA', grp:'Small/Micro', seg:'Restaurant'},
  {t:'NAPA', grp:'Small/Micro', seg:'Winery / Beverage'},
];

const CAP_ORDER = { 'Large': 0, 'Mid': 1, 'Small/Micro': 2 };

let activeSet = new Set();
let sortCol = 'cap';
let sortDir = 1;

function capLabel(grp) {
  if (grp === 'Large') return 'Large Cap';
  if (grp === 'Mid') return 'Mid Cap';
  return 'Small/Micro Cap';
}
function capClass(grp) {
  if (grp === 'Large') return 'large';
  if (grp === 'Mid') return 'mid';
  return 'small';
}

function loadState() {
  try {
    const raw = localStorage.getItem('apex_tickers');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.approved) {
        activeSet = new Set(data.approved.split(',').filter(Boolean));
      } else {
        activeSet = new Set(ALL_TICKERS.map(t => t.t));
      }
    } else {
      activeSet = new Set(ALL_TICKERS.map(t => t.t));
    }
  } catch(e) {
    activeSet = new Set(ALL_TICKERS.map(t => t.t));
  }
}

function saveState() {
  try {
    const existing = JSON.parse(localStorage.getItem('apex_tickers') || '{}');
    existing.list = ALL_TICKERS.map(t => ({ t: t.t, grp: t.grp }));
    existing.approved = [...activeSet].join(',');
    localStorage.setItem('apex_tickers', JSON.stringify(existing));
  } catch(e) {}
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2000);
  updateCounts();
}

function updateCounts() {
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = ALL_TICKERS.length;
  document.getElementById('activeCount').textContent = activeSet.size;
}

function getFiltered() {
  const q = document.getElementById('searchInp').value.trim().toLowerCase();
  const cap = document.getElementById('capFilter').value;
  const seg = document.getElementById('segFilter').value;
  const status = document.getElementById('activeFilter').value;

  return ALL_TICKERS.filter(tk => {
    if (cap && tk.grp !== cap) return false;
    if (seg && tk.seg !== seg) return false;
    if (status === 'active' && !activeSet.has(tk.t)) return false;
    if (status === 'inactive' && activeSet.has(tk.t)) return false;
    if (q && !tk.t.toLowerCase().includes(q) && !tk.seg.toLowerCase().includes(q) && !tk.grp.toLowerCase().includes(q)) return false;
    return true;
  });
}

function getSorted(list) {
  return [...list].sort((a, b) => {
    let av, bv;
    if (sortCol === 't') { av = a.t; bv = b.t; }
    else if (sortCol === 'cap') {
      av = CAP_ORDER[a.grp] + a.seg;
      bv = CAP_ORDER[b.grp] + b.seg;
    }
    else if (sortCol === 'seg') { av = a.seg; bv = b.seg; }
    else { av = a[sortCol] || ''; bv = b[sortCol] || ''; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });
}

function setSort(col) {
  if (sortCol === col) { sortDir *= -1; }
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const icon = document.getElementById('sort-' + col);
  if (icon) {
    icon.closest('th').classList.add('sorted');
    icon.textContent = sortDir === 1 ? 'â' : 'â';
  }
  renderTable();
}

function renderTable() {
  const filtered = getFiltered();
  const sorted = getSorted(filtered);
  const tbody = document.getElementById('tableBody');
  if (sorted.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No tickers match your filters.</td></tr>';
    updateCounts();
    return;
  }

  let html = '';
  let lastGroup = null;

  // Only show group headers when sorted by cap
  const showGroups = (sortCol === 'cap');

  sorted.forEach(tk => {
    if (showGroups && tk.grp !== lastGroup) {
      lastGroup = tk.grp;
      const count = sorted.filter(x => x.grp === tk.grp).length;
      html += `<tr class="group-row"><td colspan="4">${capLabel(tk.grp)} &nbsp;<span style="color:#475569;font-weight:400">(${count})</span></td></tr>`;
    }
    const isActive = activeSet.has(tk.t);
    html += `<tr class="${isActive ? '' : 'inactive'}">
      <td class="col-sym">${tk.t}</td>
      <td><span class="cap-pill ${capClass(tk.grp)}">${capLabel(tk.grp)}</span></td>
      <td class="col-seg">${tk.seg}</td>
      <td class="col-active">
        <label class="toggle" title="${isActive ? 'Active â click to disable' : 'Inactive â click to enable'}">
          <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleTicker('${tk.t}', this.checked)">
          <span class="slider"></span>
        </label>
      </td>
    </tr>`;
  });

  tbody.innerHTML = html;
  updateCounts();
}

function toggleTicker(sym, on) {
  if (on) activeSet.add(sym);
  else activeSet.delete(sym);
  // Update row class without full re-render
  const row = document.querySelector(`input[onchange*="'${sym}'"]`)?.closest('tr');
  if (row) row.className = on ? '' : 'inactive';
  updateCounts();
}

function bulkToggle(on) {
  const filtered = getFiltered();
  filtered.forEach(tk => { if (on) activeSet.add(tk.t); else activeSet.delete(tk.t); });
  renderTable();
}

function resetToDefault() {
  activeSet = new Set(ALL_TICKERS.map(t => t.t));
  renderTable();
}

function populateSegFilter() {
  const segs = [...new Set(ALL_TICKERS.map(t => t.seg))].sort();
  const sel = document.getElementById('segFilter');
  segs.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// Init
loadState();
populateSegFilter();
setSort('cap'); // default sort by cap tier
renderTable();
</script>
</body>
</html>
