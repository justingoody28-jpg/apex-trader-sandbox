<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Watchlist Manager — APEX</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d1117;
  --surface:   #13181f;
  --surface2:  #1a2030;
  --border:    #21272f;
  --border2:   #2d3748;
  --accent:    #00d4ff;
  --accent-dim:#004d5e;
  --text:      #e6edf3;
  --muted:     #6e7a8a;
  --dim:       #3d4a5a;
  --green:     #00e676;
  --green-dim: #003d1f;
  --yellow:    #ffb300;
  --yellow-dim:#3d2c00;
  --red:       #ff4444;
  --red-dim:   #3d0000;
  --a:  #c084fc; --a-dim: rgba(192,132,252,0.08);
  --b:  #86efac; --b-dim: rgba(134,239,172,0.08);
  --c:  #67e8f9; --c-dim: rgba(103,232,249,0.08);
  --d:  #ff6b6b; --d-dim: rgba(255,107,107,0.08);
  --e:  #69db7c; --e-dim: rgba(105,219,124,0.08);
  --f:  #ff9f43; --f-dim: rgba(255,159,67,0.08);
  --g:  #74c0fc; --g-dim: rgba(116,192,252,0.08);
  --h:  #ffd43b; --h-dim: rgba(255,212,59,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; min-height: 100vh; }

/* ── Breadcrumb ─────────────────────────────────────────── */
.breadcrumb { padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Sans', sans-serif; }
.breadcrumb span { color: var(--accent); }
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: var(--accent); }

/* ── Header ─────────────────────────────────────────────── */
.wm-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; background: var(--surface); cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); gap: 12px; }
.wm-header:hover { background: var(--surface2); }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-icon { width: 28px; height: 28px; background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--accent); flex-shrink: 0; }
.header-title { font-weight: 700; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
.header-sub { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 10px; }
.pill { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; border: 1px solid; }
.pill-accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.pill-muted  { background: transparent; border-color: var(--border2); color: var(--muted); }
.chevron { color: var(--dim); font-size: 10px; transition: transform 0.2s; margin-left: 4px; }
.open .chevron { transform: rotate(180deg); }

/* ── Body ───────────────────────────────────────────────── */
.wm-body { display: none; }
.open .wm-body { display: block; }

/* ── Scenario tabs ──────────────────────────────────────── */
.sc-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; padding: 0 6px; }
.sc-tabs::-webkit-scrollbar { display: none; }
.sc-tab { display: flex; flex-direction: column; align-items: center; padding: 10px 18px 8px; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: color 0.15s, background 0.15s; font-family: 'IBM Plex Mono', monospace; gap: 3px; min-width: 72px; }
.sc-tab:hover { background: var(--surface2); color: var(--text); }
.sc-tab.active { color: var(--text); }
.sc-tab-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; }
.sc-tab-meta { font-size: 9px; font-weight: 400; letter-spacing: 0; opacity: 0.65; font-family: 'IBM Plex Sans', sans-serif; }
.sc-tab-count { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-top: 1px; background: var(--border); color: var(--muted); }
.sc-tab.active .sc-tab-count { background: color-mix(in srgb, currentColor 15%, transparent); color: currentColor; }
.sc-tab[data-s="A"].active { color: var(--a); border-color: var(--a); background: var(--a-dim); }
.sc-tab[data-s="B"].active { color: var(--b); border-color: var(--b); background: var(--b-dim); }
.sc-tab[data-s="C"].active { color: var(--c); border-color: var(--c); background: var(--c-dim); }
.sc-tab[data-s="D"].active { color: var(--d); border-color: var(--d); background: var(--d-dim); }
.sc-tab[data-s="E"].active { color: var(--e); border-color: var(--e); background: var(--e-dim); }
.sc-tab[data-s="F"].active { color: var(--f); border-color: var(--f); background: var(--f-dim); }
.sc-tab[data-s="G"].active { color: var(--g); border-color: var(--g); background: var(--g-dim); }
.sc-tab[data-s="H"].active { color: var(--h); border-color: var(--h); background: var(--h-dim); }

/* ── Scenario panel ─────────────────────────────────────── */
.sc-panel { display: none; }
.sc-panel.active { display: block; }

/* ── Panel bar ──────────────────────────────────────────── */
.panel-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 10px; }
.panel-params { display: flex; gap: 16px; flex-wrap: wrap; }
.param-item { display: flex; flex-direction: column; gap: 1px; }
.param-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); font-family: 'IBM Plex Sans', sans-serif; }
.param-val { font-size: 12px; font-weight: 700; color: var(--text); }
.param-val.good { color: var(--green); }
.param-val.warn { color: var(--yellow); }
.panel-actions { display: flex; align-items: center; gap: 8px; }
.stats-row { display: flex; gap: 12px; align-items: center; font-size: 11px; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; }
.stat-val { font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; }

/* ── Filter bar ─────────────────────────────────────────── */
.filter-bar { display: flex; align-items: center; gap: 10px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--bg); flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 260px; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 12px; pointer-events: none; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 5px 10px 5px 28px; outline: none; transition: border-color 0.15s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--dim); }
.filter-btns { display: flex; gap: 4px; }
.fbtn { padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }
.fbtn:hover, .fbtn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.fbtn.red.active { border-color: var(--red); color: var(--red); background: var(--red-dim); }

/* ── Ticker list ────────────────────────────────────────── */
.ticker-list { padding: 0; max-height: 440px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.ticker-list::-webkit-scrollbar { width: 4px; }
.ticker-list::-webkit-scrollbar-track { background: transparent; }
.ticker-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.ticker-row { display: grid; grid-template-columns: 80px 1fr 70px 54px; align-items: center; padding: 9px 20px; border-bottom: 1px solid rgba(33,39,47,0.7); gap: 8px; transition: background 0.1s; }
.ticker-row:last-child { border-bottom: none; }
.ticker-row:hover { background: var(--surface2); }
.ticker-row.disabled { opacity: 0.35; }
.ticker-row.header-row { padding: 6px 20px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); font-weight: 600; font-family: 'IBM Plex Sans', sans-serif; cursor: default; position: sticky; top: 0; z-index: 10; }
.ticker-row.header-row:hover { background: var(--surface); }

/* Cells */
.tk-sym { font-weight: 700; font-size: 13px; letter-spacing: 0.06em; color: var(--text); display: flex; align-items: center; gap: 6px; }
.grp-badge { font-size: 8px; font-weight: 600; padding: 1px 4px; border-radius: 3px; letter-spacing: 0.05em; background: var(--border); color: var(--dim); white-space: nowrap; }
.perf-wrap { display: flex; align-items: center; gap: 8px; }
.perf-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.perf-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.perf-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.wr-label { font-size: 11px; font-weight: 700; min-width: 40px; }
.wr-label.good { color: var(--green); }
.wr-label.warn { color: var(--yellow); }
.wr-label.bad  { color: var(--red); }
.wr-label.none { color: var(--dim); }
.sig-label { font-size: 10px; color: var(--muted); white-space: nowrap; }

/* Toggle */
.toggle-wrap { display: flex; justify-content: center; }
.toggle { position: relative; width: 34px; height: 18px; cursor: pointer; flex-shrink: 0; }
.toggle input { display: none; }
.toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 9px; transition: background 0.2s; }
.toggle input:checked ~ .toggle-track { background: var(--accent); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; background: white; border-radius: 50%; transition: transform 0.2s; z-index: 1; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

/* Group sep */
.group-sep { padding: 5px 20px; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); background: rgba(13,17,23,0.8); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; position: sticky; top: 28px; z-index: 9; }

/* mpty state */
.empty { padding: 40px 20px; text-align: center; color: var(--dim); font-size: 12px; font-family: 'IBM Plex Sans', sans-serif; }
.empty-icon { font-size: 28px; margin-bottom: 8px; }

/* ── Save bar ───────────────────────────────────────────── */
.save-bar { display: none; align-items: center; justify-content: space-between; padding: 10px 20px; background: rgba(0,212,255,0.04); border-top: 1px solid rgba(0,212,255,0.15); gap: 12px; }
.save-bar.visible { display: flex; }
.save-msg { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--accent); font-family: 'IBM Plex Sans', sans-serif; }
.pulse { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.7);} }
.save-actions { display: flex; gap: 8px; }
.btn { padding: 5px 14px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; transition: all 0.15s; }
.btn-outline { background: transparent; border-color: var(--border2); color: var(--muted); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
.btn-primary:hover { filter: brightness(0.9); }
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────
let excluded = {};
let stats = {};
let activeId = 'E';
let dirty = false;
let filters = {};
SC.forEach(s => {
  excluded[s.id] = new Set();
  filters[s.id] = { search: '', show: 'all' };
});

// ── Load / Save ──────────────────────────────────────────────────────────────
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('apex_tickers') || '{}');
    const excl = d.excluded || {};
    SC.forEach(s => { excluded[s.id] = new Set(excl[s.id] || []); });
  } catch(e) {}
  try {
    stats = JSON.parse(localStorage.getItem('apex_backtest_stats') || '{}');
  } catch(e) { stats = {}; }
}

function saveState() {
  try {
    const d = JSON.parse(localStorage.getItem('apex_tickers') || '{}');
    d.list = ALL_TICKERS.map(t => ({ t: t.t, grp: t.g }));
    d.approved = ALL_TICKERS.map(t => t.t).filter(sym => SC.some(s => !excluded[s.id].has(sym))).join(',');
    const excl = {};
    SC.forEach(s => { excl[s.id] = [...excluded[s.id]]; });
    d.excluded = excl;
    localStorage.setItem('apex_tickers', JSON.stringify(d));
  } catch(e) {}
  dirty = false;
  document.getElementById('saveBar').classList.remove('visible');
  // Flash confirm
  const bar = document.getElementById('saveBar');
  bar.classList.add('visible');
  bar.querySelector('.save-msg').innerHTML = '✓ Saved';
  setTimeout(() => bar.classList.remove('visible'), 1800);
}

function discard() {
  loadState();
  dirty = false;
  document.getElementById('saveBar').classList.remove('visible');
  renderPanels();
  renderTabs();
}

// ── Perf helpers ──────────────────────────────────────────────────────────────
function getPerf(tk, scId) {
  const p = stats[tk]?.[scId];
  if (!p || !p.n) return null;
  return { wr: Math.round(p.w / p.n * 100), n: p.n };
}

function perfClass(wr, be) {
  if (wr >= be) return 'good';
  if (wr >= be * 0.8) return 'warn';
  return 'bad';
}

function barColor(cls) {
  return cls === 'good' ? 'var(--green)' : cls === 'warn' ? 'var(--yellow)' : 'var(--red)';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() { renderTabs(); renderPanels(); updateHeader(); }

function renderTabs() {
  document.getElementById('scTabs').innerHTML = SC.map(s => {
    const active = ALL_TICKERS.filter(t => !excluded[s.id].has(t.t)).length;
    return `<button class="sc-tab ${s.id === activeId ? 'active' : ''}" data-s="${s.id}" onclick="switchTab('${s.id}')">
      <span class="sc-tab-label">${s.label}</span>
      <span class="sc-tab-meta">${s.sub}</span>
      <span class="sc-tab-count">${active}</span>
    </button>`;
  }).join('');
}

function renderPanels() {
  document.getElementById('panels').innerHTML = SC.map(s => `
    <div class="sc-panel ${s.id === activeId ? 'active' : ''}" id="panel-${s.id}">
      ${renderPanelBar(s)}
      ${renderFilterBar(s)}
      <div class="ticker-list" id="list-${s.id}">${renderTickerList(s)}</div>
    </div>`).join('');
}

function renderPanelBar(s) {
  const active = ALL_TICKERS.filter(t => !excluded[s.id].has(t.t)).length;
  const excl = excluded[s.id].size;
  return `<div class="panel-bar">
    <div class="panel-params">
      <div class="param-item"><span class="param-label">Take Profit</span><span class="param-val good">${s.tp}</span></div>
      <div class="param-item"><span class="param-label">Stop Loss</span><span class="param-val warn">${s.sl}</span></div>
      <div class="param-item"><span class="param-label">Break-Even WR</span><span class="param-val">${s.be}%</span></div>
      <div class="param-item"><span class="param-label">Bet Size</span><span class="param-val" style="color:var(--accent)">${s.bet}</span></div>
    </div>
    <div class="stats-row">
      <span><span class="stat-val">${active}</span> active</span>
      <span style="color:var(--dim)">·</span>
      <span><span class="stat-val">${excl}</span> excluded</span>
      <span style="color:var(--dim)">·</span>
      <span><span class="stat-val">${ALL_TICKERS.length}</span> total</span>
    </div>
  </div>`;
}

function renderFilterBar(s) {
  const f = filters[s.id];
  return `<div class="filter-bar" id="fbar-${s.id}">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" placeholder="Search tickers…" value="${f.search}"
             oninput="setSearch('${s.id}', this.value)">
    </div>
    <div class="filter-btns">
      <button class="fbtn ${f.show==='all'?'active':''}"    onclick="setFilter('${s.id}','all')">All</button>
      <button class="fbtn ${f.show==='active'?'active':''}" onclick="setFilter('${s.id}','active')">Active</button>
      <button class="fbtn ${f.show==='excl'?'active':''}"   onclick="setFilter('${s.id}','excl')">Excluded</button>
      <button class="fbtn ${f.show==='nodata'?'active':''}" onclick="setFilter('${s.id}','nodata')">No Data</button>
      <button class="fbtn red ${f.show==='below'?'active':''}" onclick="setFilter('${s.id}','below')">Below BE</button>
    </div>
  </div>`;
}

function renderTickerList(s) {
  const f = filters[s.id];
  const groups = [
    { key:'Lg', label:'Large Cap' },
    { key:'Mid', label:'Mid Cap' },
    { key:'SM', label:'Small / Micro Cap' },
  ];
  let html = `<div class="ticker-row header-row">
    <div>Ticker</div><div>Backtest Edge</div><div style="text-align:center">Active</div><div></div>
  </div>`;
  let total = 0;
  groups.forEach(grp => {
    let tks = ALL_TICKERS.filter(t => t.g === grp.key);
    if (f.search) tks = tks.filter(t => t.t.includes(f.search.toUpperCase()) || (t.seg||'').toLowerCase().includes(f.search.toLowerCase()));
    if (f.show === 'active')  tks = tks.filter(t => !excluded[s.id].has(t.t));
    if (f.show === 'excl')    tks = tks.filter(t =>  excluded[s.id].has(t.t));
    if (f.show === 'nodata')  tks = tks.filter(t => !getPerf(t.t, s.id));
    if (f.show === 'below')   tks = tks.filter(t => { const p = getPerf(t.t,s.id); return p && p.wr < s.be; });
    if (!tks.length) return;
    total += tks.length;
    html += `<div class="group-sep">${grp.label} · ${tks.length}</div>`;
    html += tks.map(t => renderRow(t, s)).join('');
  });
  if (!total) html += `<div class="empty"><div class="empty-icon">◎&nbsp;</div>No tickers match this filter</div>`;
  return html;
}

function renderRow(t, s) {
  const isExcl = excluded[s.id].has(t.t);
  const p = getPerf(t.t, s.id);
  const cls = p ? perfClass(p.wr, s.be) : 'none';
  const wr = p ? `${p.wr}%` : '—';
  const n = p ? p.n : 0;
  const barW = p ? Math.min(100, p.wr) : 0;
  const sigText = n > 0 ? `${n} signals` : 'no backtest data';
  return `<div class="ticker-row ${isExcl?'disabled':''}" id="row-${s.id}-${t.t}">
    <div class="tk-sym">${t.t}<span class="grp-badge">${t.g}</span></div>
    <div><div class="perf-wrap">
      <span class="wr-label ${cls}">${wr}</span>
      <div class="perf-bar-wrap">
        <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${barW}%;background:${p?barColor(cls):'transparent'}"></div></div>
        <span class="sig-label">${sigText}</span>
      </div>
    </div></div>
    <div><div class="toggle-wrap"><label class="toggle">
      <input type="checkbox" ${!isExcl?'checked':''} onchange="toggleTicker('${s.id}','${t.t}',this.checked)">
      <div class="toggle-track"></div><div class="toggle-thumb"></div>
    </label></div></div>
    <div style="text-align:center;font-size:9px;color:var(--dim)">${t.seg||''}</div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function switchTab(id) {
  activeId = id;
  renderTabs();
  document.querySelectorAll('.sc-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${id}`)?.classList.add('active');
}

function setSearch(scId, val) {
  filters[scId].search = val;
  document.getElementById(`list-${scId}`).innerHTML = renderTickerList(SC.find(s=>s.id===scId));
}

function setFilter(scId, val) {
  filters[scId].show = val;
  const s = SC.find(x => x.id === scId);
  document.getElementById(`fbar-${scId}`).outerHTML = renderFilterBar(s);
  document.getElementById(`list-${scId}`).innerHTML = renderTickerList(s);
}

function toggleTicker(scId, tk, enabled) {
  if (!enabled) excluded[scId].add(tk);
  else excluded[scId].delete(tk);
  const row = document.getElementById(`row-${scId}-${tk}`);
  if (row) row.classList.toggle('disabled', !enabled);
  updateCounts(scId);
  markDirty();
}

function updateCounts(scId) {
  const active = ALL_TICKERS.filter(t => !excluded[scId].has(t.t)).length;
  const excl = excluded[scId].size;
  const s = SC.find(x => x.id === scId);
  const bar = document.querySelector(`#panel-${scId} .stats-row`);
  if (bar) bar.innerHTML = `<span><span class="stat-val">${active}</span> active</span><span style="color:var(--dim)">·</span><span><span class="stat-val">${excl}</span> excluded</span><span style="color:var(--dim)">·</span><span><span class="stat-val">${ALL_TICKERS.length}</span> total</span>`;
  const tab = document.querySelector(`.sc-tab[data-s="${scId}"] .sc-tab-count`);
  if (tab) tab.textContent = active;
}

function updateHeader() {
  const withStats = ALL_TICKERS.filter(t => stats[t.t] && Object.keys(stats[t.t]).length > 0).length;
  document.getElementById('statsCount').textContent = withStats + ' with stats';
}

function markDirty() {
  dirty = true;
  document.getElementById('saveBar').classList.add('visible');
  document.getElementById('saveBar').querySelector('.save-msg').innerHTML = '<div class="pulse"></div>Unsaved changes';
}

function togglePanel() {
  document.getElementById('wm').classList.toggle('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
