<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Watchlist Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--surface:#141414;--surface2:#1a1a1a;--border:#222;--text:#e8e8e8;--muted:#666;--accent:#f0b429;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'SF Mono',monospace;font-size:12px;min-height:100vh}
.hdr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr h1{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.5px;white-space:nowrap}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{background:#1f1f1f;border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--muted);font-size:11px}
.badge span{color:var(--accent);font-weight:600}
.btn{cursor:pointer;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-family:inherit;font-weight:600;letter-spacing:.3px;transition:.15s}
.btn-save{background:var(--accent);color:#000}.btn-save:hover{background:#d99e20}
.btn-ghost{background:#1a1a1a;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:#444}
.btn-danger{background:#1a0a0a;color:var(--red);border:1px solid #3a1010}.btn-danger:hover{background:#2a1010}
#saveIndicator{opacity:0;transition:.3s;color:var(--green);font-size:11px;font-weight:600}
#saveIndicator.show{opacity:1}
.filters{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filters select,.filters input{background:#111;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;font-family:inherit}
.filters select:focus,.filters input:focus{outline:none;border-color:#444}
.filters input{width:170px}
.filter-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 112px)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.c-sym{width:72px}col.c-cap{width:48px}col.c-seg{width:110px}col.c-sc{width:76px}
thead th{position:sticky;top:0;background:#111;z-index:10;border-bottom:2px solid var(--border);padding:6px 4px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.5px;white-space:nowrap}
thead th.h-sym{text-align:left;padding-left:10px;cursor:pointer;user-select:none}
thead th.h-sym:hover,thead th.h-seg:hover{background:#181818}
thead th.h-seg{text-align:left;cursor:pointer;user-select:none}
thead th.h-cap{cursor:pointer;user-select:none}thead th.h-cap:hover{background:#181818}
.sc-hdr{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:2px 0}
.sc-hdr:hover{opacity:.75}
.sc-hdr .sc-lbl{font-size:12px;font-weight:700;color:var(--accent)}
.sc-hdr .sc-excl{font-size:9px;color:var(--muted)}
tbody tr{border-bottom:1px solid #181818;transition:.1s}
tbody tr:hover{background:#181818}
tbody tr.excl-all{opacity:.35}
td{padding:4px;text-align:center;vertical-align:middle}
td.c-sym{text-align:left;padding-left:10px;font-weight:600;font-size:11px}
td.c-cap{font-size:10px;color:var(--muted)}
td.c-seg{text-align:left;font-size:10px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:4px}
.sc-cell{display:flex;flex-direction:column;align-items:center;gap:1px}
.sc-cell input[type=checkbox]{cursor:pointer;accent-color:var(--accent);width:13px;height:13px}
.sc-stat{font-size:9px;font-weight:600;line-height:1.1}
.sc-stat.hi{color:var(--green)}.sc-stat.md{color:var(--yellow)}.sc-stat.lo{color:var(--red)}.sc-stat.none{color:#3a3a3a}
.sc-cell.off .sc-stat{opacity:.3}
.sa{display:inline-block;margin-left:3px;opacity:.35;font-size:9px}.sa.on{opacity:1;color:var(--accent)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>
<div class="hdr">
  <h1>⚙ APEX WATCHLIST</h1>
  <div class="badge">Tickers <span id="cTotal">223</span></div>
  <div class="badge">With Stats <span id="cStats">0</span></div>
  <div class="hdr-right">
    <span id="saveIndicator">✓ Saved</span>
    <button class="btn btn-danger" onclick="clearStats()">Clear Stats</button>
    <button class="btn btn-ghost" onclick="resetAll()">Reset All</button>
    <button class="btn btn-save" onclick="saveState()">Save Watchlist</button>
  </div>
</div>
<div class="filters">
  <span class="filter-label">Filter:</span>
  <select id="fCap" onchange="applyFilters()">
    <option value="">All Caps</option>
    <option value="Large">Large</option>
    <option value="Mid">Mid</option>
    <option value="Small/Micro">Small/Micro</option>
  </select>
  <select id="fSeg" onchange="applyFilters()"><option value="">All Segments</option></select>
  <select id="fSc" onchange="applyFilters()">
    <option value="">All Scenarios</option>
    <option value="A">A exclusions</option><option value="B">B exclusions</option>
    <option value="C">C exclusions</option><option value="D">D exclusions</option>
    <option value="E">E exclusions</option><option value="F">F exclusions</option>
    <option value="G">G exclusions</option><option value="H">H exclusions</option>
  </select>
  <input id="fSearch" placeholder="Search symbol or segment…" oninput="applyFilters()">
  <span class="filter-label" style="margin-left:8px">Showing <span id="cShowing">223</span></span>
</div>
<div class="tbl-wrap">
<table>
  <colgroup>
    <col class="c-sym"><col class="c-cap"><col class="c-seg">
    <col class="c-sc"><col class="c-sc"><col class="c-sc"><col class="c-sc">
    <col class="c-sc"><col class="c-sc"><col class="c-sc"><col class="c-sc">
  </colgroup>
  <thead><tr>
    <th class="h-sym" onclick="sortBy('sym')">SYMBOL<span class="sa" id="a-sym">↕</span></th>
    <th class="h-cap" onclick="sortBy('cap')">CAP<span class="sa" id="a-cap">↕</span></th>
    <th class="h-seg" onclick="sortBy('seg')">SEGMENT<span class="sa" id="a-seg">↕</span></th>
    <th onclick="toggleAll('A')"><div class="sc-hdr"><span class="sc-lbl">A</span><span class="sc-excl" id="x-A">all on</span></div></th>
    <th onclick="toggleAll('B')"><div class="sc-hdr"><span class="sc-lbl">B</span><span class="sc-excl" id="x-B">all on</span></div></th>
    <th onclick="toggleAll('C')"><div class="sc-hdr"><span class="sc-lbl">C</span><span class="sc-excl" id="x-C">all on</span></div></th>
    <th onclick="toggleAll('D')"><div class="sc-hdr"><span class="sc-lbl">D</span><span class="sc-excl" id="x-D">all on</span></div></th>
    <th onclick="toggleAll('E')"><div class="sc-hdr"><span class="sc-lbl">E</span><span class="sc-excl" id="x-E">all on</span></div></th>
    <th onclick="toggleAll('F')"><div class="sc-hdr"><span class="sc-lbl">F</span><span class="sc-excl" id="x-F">all on</span></div></th>
    <th onclick="toggleAll('G')"><div class="sc-hdr"><span class="sc-lbl">G</span><span class="sc-excl" id="x-G">all on</span></div></th>
    <th onclick="toggleAll('H')"><div class="sc-hdr"><span class="sc-lbl">H</span><span class="sc-excl" id="x-H">all on</span></div></th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

mall/Micro","seg":"Medtech"},{"t":"RNXT","grp":"Small/Micro","seg":"Medtech"},{"t":"WTTR","grp":"Small/Micro","seg":"Energy Services"},{"t":"KLXE","grp":"Small/Micro","seg":"Energy Services"},{"t":"NINE","grp":"Small/Micro","seg":"Energy Services"},{"t":"BORR","grp":"Small/Micro","seg":"Offshore Drilling"},{"t":"PTEN","grp":"Small/Micro","seg":"Energy Services"},{"t":"PUMP","grp":"Small/Micro","seg":"Energy Services"},{"t":"NR","grp":"Small/Micro","seg":"Energy Services"},{"t":"PFIE","grp":"Small/Micro","seg":"Energy Services"},{"t":"DNOW","grp":"Small/Micro","seg":"Energy Distribution"},{"t":"GPOR","grp":"Small/Micro","seg":"E&P Energy"},{"t":"KCAL","grp":"Small/Micro","seg":"Energy Services"},{"t":"TPVG","grp":"Small/Micro","seg":"BDC"},{"t":"XPOF","grp":"Small/Micro","seg":"Fitness"},{"t":"PLBY","grp":"Small/Micro","seg":"Consumer Media"},{"t":"LAZY","grp":"Small/Micro","seg":"Retail"},{"t":"GIII","grp":"Small/Micro","seg":"Apparel"},{"t":"CATO","grp":"Small/Micro","seg":"Retail"},{"t":"SCVL","grp":"Small/Micro","seg":"Retail"},{"t":"DXLG","grp":"Small/Micro","seg":"Retail"},{"t":"CURV","grp":"Small/Micro","seg":"Retail"},{"t":"BURL","grp":"Small/Micro","seg":"Retail"},{"t":"CULP","grp":"Small/Micro","seg":"Textiles"},{"t":"ITRN","grp":"Small/Micro","seg":"IoT / Tech"},{"t":"HIMS","grp":"Small/Micro","seg":"Telehealth"},{"t":"BARK","grp":"Small/Micro","seg":"Pet Products"},{"t":"PETQ","grp":"Small/Micro","seg":"Pet Products"},{"t":"GENC","grp":"Small/Micro","seg":"Industrial"},{"t":"HLIO","grp":"Small/Micro","seg":"Industrial"},{"t":"FWRD","grp":"Small/Micro","seg":"Logistics"},{"t":"HTLD","grp":"Small/Micro","seg":"Logistics"},{"t":"USAK","grp":"Small/Micro","seg":"Logistics"},{"t":"ATSG","grp":"Small/Micro","seg":"Air Cargo"},{"t":"AIRT","grp":"Small/Micro","seg":"Air Services"},{"t":"GLDD","grp":"Small/Micro","seg":"Marine Construction"},{"t":"MFAC","grp":"Small/Micro","seg":"Financial Services"},{"t":"NVEE","grp":"Small/Micro","seg":"Environmental"},{"t":"CLPR","grp":"Small/Micro","seg":"REIT"},{"t":"NXRT","grp":"Small/Micro","seg":"REIT"},{"t":"GOOD","grp":"Small/Micro","seg":"REIT"},{"t":"LAND","grp":"Small/Micro","seg":"REIT"},{"t":"GIPR","grp":"Small/Micro","seg":"REIT"},{"t":"PKST","grp":"Small/Micro","seg":"REIT"},{"t":"JBGS","grp":"Small/Micro","seg":"REIT"},{"t":"AIV","grp":"Small/Micro","seg":"REIT"},{"t":"GMRE","grp":"Small/Micro","seg":"REIT"},{"t":"CLDT","grp":"Small/Micro","seg":"Hotel REIT"},{"t":"SHAK","grp":"Small/Micro","seg":"Restaurant"},{"t":"KRUS","grp":"Small/Micro","seg":"Restaurant"},{"t":"FWRG","grp":"Small/Micro","seg":"Restaurant"},{"t":"ARCO","grp":"Small/Micro","seg":"Restaurant"},{"t":"PZZA","grp":"Small/Micro","seg":"Restaurant"},{"t":"NAPA","grp":"Small/Micro","seg":"Winery / Beverage"}];
let excl = {}, stats = {}, sortCol='sym', sortDir=1, filtered=[...ALL];

function loadState(){
  try{const d=JSON.parse(localStorage.getItem('apex_tickers')||'{}');const e=d.excluded||{};SC.forEach(s=>{excl[s]=new Set(e[s]||[]);});}
  catch(e){SC.forEach(s=>{excl[s]=new Set();});}
  try{stats=JSON.parse(localStorage.getItem('apex_backtest_stats')||'{}');}catch(e){stats={};}
}

function saveState(){
  try{
    const d=JSON.parse(localStorage.getItem('apex_tickers')||'{}');
    d.list=ALL.map(t=>({t:t.t,grp:t.grp}));
    d.approved=ALL.map(t=>t.t).filter(s=>SC.some(sc=>!excl[sc].has(s))).join(',');
    const e={};SC.forEach(sc=>{e[sc]=[...excl[sc]];});d.excluded=e;
    localStorage.setItem('apex_tickers',JSON.stringify(d));
  }catch(e){}
  const ind=document.getElementById('saveIndicator');ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),2000);
  updateHdr();
}

function clearStats(){
  if(!confirm('Clear all backtest stats?'))return;
  localStorage.removeItem('apex_backtest_stats');stats={};render();
}

function resetAll(){
  if(!confirm('Reset all exclusions? Every ticker will be active in all scenarios.'))return;
  SC.forEach(sc=>{excl[sc]=new Set();});render();
}

function populateSeg(){
  const segs=[...new Set(ALL.map(t=>t.seg).filter(Boolean))].sort();
  const sel=document.getElementById('fSeg');
  segs.forEach(s=>{const o=document.createElement('option');o.value=o.textContent=s;sel.appendChild(o);});
}

function toggleCell(sym,sc){
  if(excl[sc].has(sym))excl[sc].delete(sym);else excl[sc].add(sym);
  const cb=document.getElementById('cb-'+sym+'-'+sc);if(cb)cb.checked=!excl[sc].has(sym);
  const cl=document.getElementById('cl-'+sym+'-'+sc);if(cl)cl.classList.toggle('off',excl[sc].has(sym));
  updateHdr();
}

function toggleAll(sc){
  const allOff=filtered.every(t=>excl[sc].has(t.t));
  filtered.forEach(t=>{if(allOff)excl[sc].delete(t.t);else excl[sc].add(t.t);});
  render();
}

function getStat(sym,sc){
  const s=stats[sym]?.[sc];
  if(!s||!s.n)return null;
  return{wr:Math.round(s.w/s.n*100),n:s.n};
}

function wrCls(wr){return wr>=60?'hi':wr>=45?'md':'lo';}

function applyFilters(){
  const cap=document.getElementById('fCap').value;
  const seg=document.getElementById('fSeg').value;
  const sc=document.getElementById('fSc').value;
  const q=document.getElementById('fSearch').value.toLowerCase().trim();
  filtered=ALL.filter(t=>{
    if(cap&&t.grp!==cap)return false;
    if(seg&&t.seg!==seg)return false;
    if(sc&&!excl[sc].has(t.t))return false;
    if(q&&!t.t.toLowerCase().includes(q)&&!(t.seg||'').toLowerCase().includes(q))return false;
    return true;
  });
  sortArr();render();
}

function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
  document.querySelectorAll('.sa').forEach(a=>{a.classList.remove('on');a.textContent='↕';});
  const a=document.getElementById('a-'+col);if(a){a.classList.add('on');a.textContent=sortDir>0?'↑':'↓';}
  sortArr();render();
}

function sortArr(){
  const co={'Large':0,'Mid':1,'Small/Micro':2};
  filtered.sort((a,b)=>{
    let av,bv;
    if(sortCol==='sym'){av=a.t;bv=b.t;}
    else if(sortCol==='cap'){av=co[a.grp]??9;bv=co[b.grp]??9;}
    else{av=a.seg||'';bv=b.seg||'';}
    return typeof av==='string'?sortDir*av.localeCompare(bv):sortDir*(av-bv);
  });
}

function render(){
  const tb=document.getElementById('tbody');
  const f=document.createDocumentFragment();
  filtered.forEach(t=>{
    const sym=t.t;
    const allOff=SC.every(sc=>excl[sc].has(sym));
    const tr=document.createElement('tr');
    if(allOff)tr.className='excl-all';
    const capShort=t.grp==='Small/Micro'?'SM':t.grp==='Large'?'LG':'MD';
    tr.innerHTML='<td class="c-sym">'+sym+'</td><td class="c-cap">'+capShort+'</td><td class="c-seg" title="'+(t.seg||'')+'">'+(t.seg||'—')+'</td>';
    SC.forEach(sc=>{
      const off=excl[sc].has(sym);
      const st=getStat(sym,sc);
      const statTxt=st?st.wr+'%/'+st.n:'—';
      const statCls=st?wrCls(st.wr):'none';
      const td=document.createElement('td');
      td.innerHTML='<div class="sc-cell'+(off?' off':'')+'" id="cl-'+sym+'-'+sc+'">'
        +'<input type="checkbox" id="cb-'+sym+'-'+sc+'" '+(off?'':'checked')+'>'
        +'<span class="sc-stat '+statCls+'">'+statTxt+'</span></div>';
      td.querySelector('input').addEventListener('change',()=>toggleCell(sym,sc));
      tr.appendChild(td);
    });
    f.appendChild(tr);
  });
  tb.innerHTML='';tb.appendChild(f);
  document.getElementById('cShowing').textContent=filtered.length;
  updateHdr();
}

function updateHdr(){
  SC.forEach(sc=>{
    const n=[...excl[sc]].filter(s=>ALL.some(t=>t.t===s)).length;
    document.getElementById('x-'+sc).textContent=n>0?n+' off':'all on';
  });
  const ws=ALL.filter(t=>stats[t.t]&&Object.keys(stats[t.t]).length>0).length;
  document.getElementById('cStats').textContent=ws;
}

loadState();populateSeg();applyFilters();
</script>
</body>
